version: "3.8"

services:
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - guacamole
    restart: unless-stopped

  backend:
    build: ./backend
    volumes:
      - ./backend:/app
    env_file:
      - .env
    depends_on:
      - db
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    privileged: true  # Required for CentOS 7 kernel 3.10
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    environment:
      POSTGRES_DB: examlab
      POSTGRES_USER: examlab
      POSTGRES_PASSWORD: examlab
    restart: unless-stopped

  guacamole:
    image: guacamole/guacamole:1.5.5
    environment:
      GUACD_HOSTNAME: guacd
      POSTGRESQL_HOSTNAME: db
      POSTGRESQL_DATABASE: examlab
      POSTGRESQL_USER: examlab
      POSTGRESQL_PASSWORD: examlab
    depends_on:
      - guacd
      - db
    restart: unless-stopped

  guacd:
    image: guacamole/guacd:1.5.5
    privileged: true  # Required for CentOS 7 kernel 3.10
    restart: unless-stopped

volumes:
  pgdata:
